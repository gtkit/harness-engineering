name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: bash -n go-harness/setup.sh fullstack-harness/setup.sh go-pkg-harness/setup.sh laravel-harness/setup.sh laravel-fullstack-harness/setup.sh

      - name: Validate CLAUDE sync
        run: bash scripts/sync-claude-from-agents.sh --check

      - name: Run smoke test
        run: bash tests/setup_smoke_test.sh

      - name: Run C++ package smoke test
        run: bash tests/cpp_package_smoke_test.sh

      - name: Run Laravel package smoke test
        run: bash tests/laravel_package_smoke_test.sh

  smoke-windows:
    name: Smoke Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Windows setup smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tests/setup_windows_smoke_test.ps1
