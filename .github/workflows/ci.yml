name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: bash -n go-harness/setup.sh fullstack-harness/setup.sh go-pkg-harness/setup.sh laravel-harness/setup.sh laravel-fullstack-harness/setup.sh

      - name: Shellcheck (severity=warning)
        run: shellcheck -S warning go-harness/setup.sh fullstack-harness/setup.sh go-pkg-harness/setup.sh laravel-harness/setup.sh laravel-fullstack-harness/setup.sh scripts/error-journal/*.sh scripts/sync-claude-from-agents.sh tests/setup_smoke_test.sh tests/laravel_package_smoke_test.sh tests/error_journal_test.sh

      - name: Validate CLAUDE sync
        run: bash scripts/sync-claude-from-agents.sh --check

      - name: Run smoke test
        run: bash tests/setup_smoke_test.sh

      - name: Run error-journal test
        run: bash tests/error_journal_test.sh

      - name: Run Laravel package smoke test
        run: bash tests/laravel_package_smoke_test.sh

  smoke-windows:
    name: Smoke Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PSScriptAnalyzer (setup.ps1)
        shell: powershell
        run: |
          $files = @('go-harness/setup.ps1','fullstack-harness/setup.ps1','go-pkg-harness/setup.ps1','laravel-harness/setup.ps1','laravel-fullstack-harness/setup.ps1')
          $issues = $files | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Severity Warning,Error }
          if ($issues) {
            $issues | Format-Table RuleName,Severity,ScriptName,Line,Message -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer passed: 5 setup.ps1 files, 0 issues at Warning/Error"

      - name: Run Windows setup smoke test
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tests/setup_windows_smoke_test.ps1

      - name: Run error-journal PS test
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tests/error_journal_test.ps1
